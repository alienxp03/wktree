name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  verify-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check tag matches hardcoded version
        run: |
          TAG="${GITHUB_REF_NAME}"
          GO_VERSION=$(grep -oP 'var Version = "\K[^"]+' internal/cli/cli.go)
          if [ "$TAG" != "v${GO_VERSION}" ]; then
            echo "ERROR: tag is '$TAG' but internal/cli/cli.go says '${GO_VERSION}'"
            echo "Expected tag: v${GO_VERSION}"
            exit 1
          fi
          echo "Version check passed: $TAG == v${GO_VERSION}"

  build:
    needs: verify-version
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: linux
            goarch: amd64
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          CGO_ENABLED=0 go build -trimpath \
            -ldflags="-s -w -X github.com/alienxp03/wktree/internal/cli.Version=${{ github.ref_name }}" \
            -o dist/wktree ./cmd/wktree

      - name: Package
        run: |
          cd dist
          ARCHIVE=wktree-${{ github.ref_name }}-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz
          tar czf "$ARCHIVE" wktree
          sha256sum "$ARCHIVE" > "${ARCHIVE}.sha256"

      - uses: actions/upload-artifact@v7
        with:
          name: wktree-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/wktree-${{ github.ref_name }}-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*.tar.gz
          generate_release_notes: true

  update-tap:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Compute SHA256s
        id: shas
        run: |
          echo "darwin_arm64=$(sha256sum dist/wktree-${{ github.ref_name }}-darwin-arm64.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "darwin_amd64=$(sha256sum dist/wktree-${{ github.ref_name }}-darwin-amd64.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "linux_arm64=$(sha256sum dist/wktree-${{ github.ref_name }}-linux-arm64.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "linux_amd64=$(sha256sum dist/wktree-${{ github.ref_name }}-linux-amd64.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Checkout tap
        uses: actions/checkout@v6
        with:
          repository: alienxp03/homebrew-tap
          token: ${{ secrets.TAP_TOKEN }}
          path: tap

      - name: Generate formula
        env:
          VERSION: ${{ github.ref_name }}
          SHA_DARWIN_ARM64: ${{ steps.shas.outputs.darwin_arm64 }}
          SHA_DARWIN_AMD64: ${{ steps.shas.outputs.darwin_amd64 }}
          SHA_LINUX_ARM64: ${{ steps.shas.outputs.linux_arm64 }}
          SHA_LINUX_AMD64: ${{ steps.shas.outputs.linux_amd64 }}
        run: |
          mkdir -p tap/Formula
          cat > tap/Formula/wktree.rb <<FORMULA
          class Wktree < Formula
            desc "Create strict Git worktrees and open tmux workspaces"
            homepage "https://github.com/alienxp03/wktree"
            version "${VERSION}"

            on_macos do
              on_arm do
                url "https://github.com/alienxp03/wktree/releases/download/${VERSION}/wktree-${VERSION}-darwin-arm64.tar.gz"
                sha256 "${SHA_DARWIN_ARM64}"
              end
              on_intel do
                url "https://github.com/alienxp03/wktree/releases/download/${VERSION}/wktree-${VERSION}-darwin-amd64.tar.gz"
                sha256 "${SHA_DARWIN_AMD64}"
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/alienxp03/wktree/releases/download/${VERSION}/wktree-${VERSION}-linux-arm64.tar.gz"
                sha256 "${SHA_LINUX_ARM64}"
              end
              on_intel do
                url "https://github.com/alienxp03/wktree/releases/download/${VERSION}/wktree-${VERSION}-linux-amd64.tar.gz"
                sha256 "${SHA_LINUX_AMD64}"
              end
            end

            def install
              bin.install "wktree"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/wktree --version")
            end
          end
          FORMULA
          # Remove leading whitespace added by the heredoc indent
          sed -i 's/^          //' tap/Formula/wktree.rb

      - name: Commit and push formula
        working-directory: tap
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/wktree.rb
          git diff --cached --quiet || git commit -m "wktree ${VERSION}"
          git push
